name: build

on:
  push:
    branches: [main, master]
  pull_request:
  # Manual "Run workflow" button: builds AND cuts a release (see the release job).
  workflow_dispatch:

jobs:
  # Linux: standalone build WITH GStreamer from distro packages. gi comes from
  # apt's python3-gi, so we build with the SYSTEM python3 (matching gi's ABI) in
  # a venv created with --system-site-packages so gi is importable.
  build-linux:
    name: linux-x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build + GStreamer deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            patchelf ccache python3-venv \
            python3-gi python3-gi-cairo \
            gir1.2-gstreamer-1.0 gir1.2-gst-plugins-base-1.0 \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly gstreamer1.0-libav
      - name: Cache Nuitka
        uses: actions/cache@v4
        with:
          path: ~/.cache/Nuitka
          key: nuitka-linux-${{ hashFiles('pyproject.toml') }}
      - name: Install project + build toolchain
        run: |
          python3 -m venv --system-site-packages .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/pip install -e ".[build]"
      - name: Build standalone bundle (Nuitka + gi)
        run: .venv/bin/python scripts/build.py --with-gstreamer
      - name: Stage bundled binaries (ffmpeg, fpcalc)
        run: .venv/bin/python scripts/stage_binaries.py --dest build/indie_beets.dist/bin
      - name: Stage GStreamer plugins + lib closure into bundle
        run: .venv/bin/python scripts/stage_gstreamer.py bundle --dist build/indie_beets.dist
      - name: Clean-room smoke (bare ubuntu, no system GStreamer)
        run: |
          docker run --rm \
            -v "$PWD/build/indie_beets.dist:/bundle:ro" \
            -v "$PWD/scripts/smoke_clean.sh:/smoke.sh:ro" \
            ubuntu:24.04 bash -c '
              echo "--- ldd of bundled _gi (rpath should resolve glib) ---"
              ldd /bundle/gi/_gi*.so 2>&1 | grep -iE "glib|gobject|girepository|not found" || true
              echo "--- smoke ---"
              bash /smoke.sh /bundle gstreamer
            '
      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          # Upload the bundle folder (not a pre-made .zip) so the downloaded
          # artifact is a single zip of the bundle, not a zip-inside-a-zip.
          name: indie-beets-linux-x86_64
          path: build/indie_beets.dist

  # Windows: standalone build WITH the full GStreamer battery. The official
  # GStreamer MSVC runtime ships prebuilt PyGObject for CPython 3.13, so we pin
  # Python 3.13 here (the bindings won't load on 3.12).
  build-windows:
    name: windows-x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Cache Nuitka
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\Nuitka\Nuitka\Cache
          key: nuitka-windows-${{ hashFiles('pyproject.toml') }}
      - name: Install project + build toolchain
        run: |
          python -m venv .venv
          .venv\Scripts\python -m pip install --upgrade pip
          .venv\Scripts\pip install -e ".[build]"
      - name: Prepare GStreamer (gi bindings + DLL/typelib env)
        run: .venv\Scripts\python scripts/stage_gstreamer.py prepare --venv .venv
      - name: Build standalone bundle (Nuitka + gi)
        run: .venv\Scripts\python scripts/build.py --with-gstreamer
      - name: Stage helper binaries (ffmpeg, fpcalc)
        run: .venv\Scripts\python scripts/stage_binaries.py --dest build/indie_beets.dist/bin
      - name: Stage GStreamer runtime into bundle
        run: .venv\Scripts\python scripts/stage_gstreamer.py bundle --dist build/indie_beets.dist
      - name: Smoke test (GStreamer ReplayGain)
        run: .venv\Scripts\python scripts/smoke.py --dist build/indie_beets.dist --backend gstreamer
      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          # Folder, not a pre-made .zip, to avoid a zip-inside-a-zip artifact.
          name: indie-beets-windows-x86_64
          path: build/indie_beets.dist

  # macOS: build arm64 natively + x86_64 under Rosetta, then lipo-merge into a
  # single universal2 bundle that runs on both Intel and Apple Silicon.
  build-macos:
    name: macos-universal
    runs-on: macos-14   # Apple Silicon; has Rosetta 2 for the x86_64 build
    steps:
      - uses: actions/checkout@v4

      # Both arches use uv-managed python-build-standalone CPython, so the two
      # standalone trees have an identical file layout and lipo-merge 1:1.
      # (Mixing setup-python for arm64 with uv's CPython for x86_64 left ~53
      # stdlib .so/.dylib files without a counterpart — not truly universal.)
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      # NOTE: GStreamer is intentionally NOT bundled on macOS. Nuitka's macOS
      # dependency scanner FATALs on GStreamer's libglib (Nuitka#3628, unresolved;
      # neither @rpath->absolute rewriting nor the upstream workarounds help), so
      # macOS ships ffmpeg-only (which covers transcoding + ReplayGain). Revisit
      # when Nuitka#3628 is fixed. Windows + Linux bundle GStreamer.

      # --- arm64 (native) ---
      - name: Build arm64 bundle
        run: |
          # Pinned closure (no numba/scipy/llvmlite) via --no-deps.
          uv python install 3.12
          uv venv --python 3.12 .venv-arm64
          uv pip install --python .venv-arm64/bin/python --no-deps -r requirements-build.txt
          uv pip install --python .venv-arm64/bin/python --no-deps -e .
          .venv-arm64/bin/python scripts/build.py --output-dir build/arm64

      # --- x86_64 (entirely under Rosetta) ---
      - name: Build x86_64 bundle (Rosetta)
        run: |
          # An arm64 uv can't run under `arch -x86_64` ("Bad CPU type"), so fetch
          # an x86_64 uv and run the whole x86_64 toolchain (uv + Python + Nuitka
          # + clang) under Rosetta, where it sees a consistent x86_64 world.
          curl -LsSf https://github.com/astral-sh/uv/releases/download/0.11.17/uv-x86_64-apple-darwin.tar.gz -o uv-x64.tar.gz
          tar xzf uv-x64.tar.gz
          UV="$PWD/uv-x86_64-apple-darwin/uv"
          # numba/llvmlite have no x86_64 macOS wheels, so install from the
          # pinned closure with --no-deps (they're never resolved/built).
          arch -x86_64 "$UV" python install 3.12
          arch -x86_64 "$UV" venv --python 3.12 .venv-x64
          arch -x86_64 "$UV" pip install --python .venv-x64/bin/python --no-deps -r requirements-build.txt
          arch -x86_64 "$UV" pip install --python .venv-x64/bin/python --no-deps -e .
          arch -x86_64 .venv-x64/bin/python scripts/build.py --output-dir build/x86_64

      # --- fuse + batteries + package ---
      - name: lipo-merge into universal2
        run: |
          .venv-arm64/bin/python scripts/lipo_merge.py \
            --arm64 build/arm64/indie_beets.dist \
            --x86_64 build/x86_64/indie_beets.dist \
            --out build/indie_beets.dist

      - name: Stage universal binaries (ffmpeg, fpcalc)
        run: .venv-arm64/bin/python scripts/stage_binaries.py --dest build/indie_beets.dist/bin --universal

      - name: Smoke test + verify universal
        run: |
          .venv-arm64/bin/python scripts/smoke.py --dist build/indie_beets.dist --backend ffmpeg
          echo "Architectures in the executable:"
          lipo -archs build/indie_beets.dist/beet

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          # Folder, not a pre-made archive, to avoid a zip-inside-a-zip artifact.
          name: indie-beets-macos-universal
          path: build/indie_beets.dist

  # Cut a release. Runs only on the manual "Run workflow" button. Computes the
  # version automatically (<beets>-<next build> from git tags), archives the
  # freshly-built bundles, generates the component manifest + CHANGELOG notes,
  # and creates the tag + GitHub Release.
  release:
    name: Publish release
    needs: [build-linux, build-windows, build-macos]
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # tags + history are needed to compute the build number
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Compute version + release notes
        id: meta
        run: |
          ver=$(python3 scripts/next_version.py)
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          python3 scripts/changelog.py --version "$ver" > notes.md
          echo "Release version: $ver"
      - name: Archive bundles
        run: |
          ver="${{ steps.meta.outputs.version }}"
          mkdir -p out
          for d in artifacts/indie-beets-*; do
            plat="${d##*/indie-beets-}"
            name="indie-beets-$ver-$plat"
            mv "$d" "$name"
            case "$plat" in
              windows-*) zip -rq "out/$name.zip" "$name" ;;
              *)         tar -czf "out/$name.tar.gz" "$name" ;;
            esac
          done
          ls -la out
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.meta.outputs.version }}
          name: indie-beets ${{ steps.meta.outputs.version }}
          body_path: notes.md
          files: out/*
