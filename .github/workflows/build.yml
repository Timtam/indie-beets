name: build

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  # Windows + Linux: straightforward single-arch standalone builds.
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, name: windows-x86_64 }
          - { os: ubuntu-latest, name: linux-x86_64 }

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y patchelf ccache

      - name: Cache Nuitka
        uses: actions/cache@v4
        with:
          path: ${{ runner.os == 'Windows' && '~\AppData\Local\Nuitka\Nuitka\Cache' || '~/.cache/Nuitka' }}
          key: nuitka-${{ matrix.name }}-${{ hashFiles('pyproject.toml') }}

      - name: Install project + build toolchain
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[build]"

      - name: Build standalone bundle (Nuitka)
        run: python scripts/build.py

      - name: Stage bundled binaries (ffmpeg, fpcalc)
        run: python scripts/stage_binaries.py --dest build/indie_beets.dist/bin

      - name: Package archive
        run: python scripts/package.py

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        run: build\indie_beets.dist\beet.exe version

      - name: Smoke test (Unix)
        if: runner.os != 'Windows'
        run: ./build/indie_beets.dist/beet version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: indie-beets-${{ matrix.name }}
          path: dist/*

  # macOS: build arm64 natively + x86_64 under Rosetta, then lipo-merge into a
  # single universal2 bundle that runs on both Intel and Apple Silicon.
  build-macos:
    name: macos-universal
    runs-on: macos-14   # Apple Silicon; has Rosetta 2 for the x86_64 build
    steps:
      - uses: actions/checkout@v4

      # --- arm64 (native) ---
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build arm64 bundle
        run: |
          # Install from the pinned closure (no numba/scipy/llvmlite) so both
          # macOS arches get an identical module set for a clean lipo merge.
          python -m venv .venv-arm64
          .venv-arm64/bin/python -m pip install --upgrade pip
          .venv-arm64/bin/pip install --no-deps -r requirements-build.txt
          .venv-arm64/bin/pip install --no-deps -e .
          .venv-arm64/bin/python scripts/build.py --output-dir build/arm64

      # --- x86_64 (entirely under Rosetta) ---
      - name: Build x86_64 bundle (Rosetta)
        run: |
          # An arm64 uv can't run under `arch -x86_64` ("Bad CPU type"), so fetch
          # an x86_64 uv and run the whole x86_64 toolchain (uv + Python + Nuitka
          # + clang) under Rosetta, where it sees a consistent x86_64 world.
          curl -LsSf https://github.com/astral-sh/uv/releases/download/0.11.17/uv-x86_64-apple-darwin.tar.gz -o uv-x64.tar.gz
          tar xzf uv-x64.tar.gz
          UV="$PWD/uv-x86_64-apple-darwin/uv"
          # numba/llvmlite have no x86_64 macOS wheels, so install from the
          # pinned closure with --no-deps (they're never resolved/built).
          arch -x86_64 "$UV" python install 3.12
          arch -x86_64 "$UV" venv --python 3.12 .venv-x64
          arch -x86_64 "$UV" pip install --python .venv-x64/bin/python --no-deps -r requirements-build.txt
          arch -x86_64 "$UV" pip install --python .venv-x64/bin/python --no-deps -e .
          arch -x86_64 .venv-x64/bin/python scripts/build.py --output-dir build/x86_64

      # --- fuse + batteries + package ---
      - name: lipo-merge into universal2
        run: |
          .venv-arm64/bin/python scripts/lipo_merge.py \
            --arm64 build/arm64/indie_beets.dist \
            --x86_64 build/x86_64/indie_beets.dist \
            --out build/indie_beets.dist

      - name: Stage universal binaries (ffmpeg, fpcalc)
        run: .venv-arm64/bin/python scripts/stage_binaries.py --dest build/indie_beets.dist/bin --universal

      - name: Package archive
        run: .venv-arm64/bin/python scripts/package.py --platform-tag macos-universal

      - name: Smoke test + verify universal
        run: |
          ./build/indie_beets.dist/beet version
          echo "Architectures in the executable:"
          lipo -archs build/indie_beets.dist/beet

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: indie-beets-macos-universal
          path: dist/*

  release:
    name: Publish release
    needs: [build, build-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
