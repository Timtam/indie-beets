name: build

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, name: windows-x86_64 }
          - { os: ubuntu-latest, name: linux-x86_64 }
          # macOS is arm64-only: GitHub's Intel (macos-13) runners are being
          # phased out, Nuitka can't cross-compile a universal2 binary, and
          # Apple is dropping Intel support anyway. Intel Macs are not targeted.
          - { os: macos-14, name: macos-arm64 }    # Apple Silicon runner

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          # Pinned: avoids the Nuitka gi/3.14 segfault and the 3.13 MinGW gap,
          # and is the version the GStreamer (gi) phase will target.
          python-version: "3.12"

      # Nuitka needs patchelf to build standalone bundles on Linux.
      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y patchelf ccache

      - name: Cache Nuitka
        uses: actions/cache@v4
        with:
          path: ${{ runner.os == 'Windows' && '~\AppData\Local\Nuitka\Nuitka\Cache' || '~/.cache/Nuitka' }}
          key: nuitka-${{ matrix.name }}-${{ hashFiles('pyproject.toml') }}

      - name: Install project + build toolchain
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[build]"

      - name: Build standalone bundle (Nuitka)
        run: python scripts/build.py

      - name: Stage bundled binaries (ffmpeg, fpcalc)
        # NOTE: macOS pulls ffmpeg from evermeet.cx. Confirm the arm64 runner
        # gets a native arm64 build; if not, switch the macos-arm64 source.
        run: python scripts/stage_binaries.py --dest build/indie_beets.dist/bin

      - name: Package archive
        run: python scripts/package.py

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        run: build\indie_beets.dist\beet.exe version

      - name: Smoke test (Unix)
        if: runner.os != 'Windows'
        run: ./build/indie_beets.dist/beet version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: indie-beets-${{ matrix.name }}
          path: dist/*

  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
